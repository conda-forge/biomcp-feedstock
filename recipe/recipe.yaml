context:
  version: "0.8.23"

package:
  name: biomcp
  version: ${{ version }}

source:
  url: https://github.com/genomoncology/biomcp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 78b028c7300d16677d8e17157aabb63d6207950bc699f475a10f7e4fc66e2468

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      # LTO=fat is too slow on the QEMU-emulated linux-aarch64 Azure runner
      # (Azure has a 3h job timeout). Use thin LTO there to stay within budget.
      # Trade-off on aarch64 only: binary is ~5-15% larger and runtime is
      # ~1-5% slower, which is negligible for this I/O-bound CLI.
      CARGO_PROFILE_RELEASE_LTO: ${{ "thin" if linux and aarch64 else "fat" }}
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - libprotobuf
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - biomcp --help
      - biomcp version
  - package_contents:
      bin:
        - biomcp
        - biomcp-cli
      strict: true

about:
  homepage: https://biomcp.org
  summary: Biomedical CLI and MCP server for querying genes, variants, trials, articles, drugs, diseases, and more.
  description: |
    BioMCP is a single-binary CLI and MCP server for querying biomedical
    databases. One command grammar, compact markdown output, 12 entities
    across 15+ data sources including PubMed, ClinicalTrials.gov, MyGene.info,
    ClinVar, UniProt, Reactome, and more.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://biomcp.org
  repository: https://github.com/genomoncology/biomcp

extra:
  recipe-maintainers:
    - hadim
